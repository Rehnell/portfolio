<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Frontend and Software Development Portfolio">
    <title>Rehnell | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="#" id="logo">Rehnell Portfolio</a>
        <div class="nav-links">
            <a href="portfolio.html" class="items">Projects</a>
        </div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <h1>Let's explore</h1>
        <img src="images/mountains-min.jpg" class="mountains" alt="Mountains">
        <img src="images/Man Jacket Transparent.png" class="man" alt="Man">
        <img src="images/clouds-min.png" class="moving-clouds" alt="Clouds">
        <div class="circle" id="sun"></div>
    </header>

    <!-- About Me Section -->
    <section class="about">
        <h2>Front End & Software Development</h2>
        <p>Hi, I'm Rehnell, a passionate Frontend and Software Developer...</p>
        <h3>Certifications</h3>
        <p>Software and Development Level 3</p>
    </section>

    <!-- Tech Stack Section -->
    <section class="tech-stack">
        <h3>Tech Stack</h3>
        <p>My tech stack includes HTML, CSS, JavaScript, Python...</p>
        <div class="icons">
            <img src="images/python-5.svg" alt="Python">
            <img src="images/logo-javascript.svg" alt="JavaScript">
            <img src="images/html-1.svg" alt="HTML">
            <img src="images/css-3.svg" alt="CSS">
            <img src="images/react-2.svg" alt="React">
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>Contact: rehnell.dev@gmail.com</p>
    </footer>

    <script>
        function toggleMenu() {
            document.querySelector('.nav-links').classList.toggle('active');
        }
    </script>
</body>
</html>
